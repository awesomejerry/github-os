name: E2E Mocked Smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: ./
      - name: Start static server
        run: npx http-server -p 4173 &
      - name: Run Playwright smoke (mocked)
        run: npx playwright test tests/e2e/smoke.spec.js --config=playwright.config.js
